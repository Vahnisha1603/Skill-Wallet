{% extends 'base.html' %}

{% block title %}OptiCrop - Find Your Crop{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h2>Crop Prediction Engine</h2>
        <p>Enter current soil and environmental conditions to find the optimal crop.</p>
    </div>

    <div class="card">
        <form action="{{ url_for('predict') }}" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nitrogen">Nitrogen (N)</label>
                    <input type="number" step="any" id="nitrogen" name="nitrogen" placeholder="e.g. 90" required>
                </div>
                
                <div class="form-group">
                    <label for="phosphorous">Phosphorous (P)</label>
                    <input type="number" step="any" id="phosphorous" name="phosphorous" placeholder="e.g. 42" required>
                </div>

                <div class="form-group">
                    <label for="potassium">Potassium (K)</label>
                    <input type="number" step="any" id="potassium" name="potassium" placeholder="e.g. 43" required>
                </div>

                <div class="form-group">
                    <label for="temperature">Temperature (°C)</label>
                    <input type="number" step="any" id="temperature" name="temperature" placeholder="e.g. 20.8" required>
                </div>

                <div class="form-group">
                    <label for="humidity">Humidity (%)</label>
                    <input type="number" step="any" id="humidity" name="humidity" placeholder="e.g. 82.0" required>
                </div>

                <div class="form-group">
                    <label for="ph">pH Level</label>
                    <input type="number" step="any" id="ph" name="ph" placeholder="e.g. 6.5" required>
                </div>

                <div class="form-group">
                    <label for="rainfall">Rainfall (mm)</label>
                    <input type="number" step="any" id="rainfall" name="rainfall" placeholder="e.g. 202.9" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Predict Optimal Crop</button>
            </div>
        </form>

        {% if prediction_text %}
        <div class="result-alert">
            <h3>Prediction Result</h3>
            <p>{{ prediction_text }}</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
